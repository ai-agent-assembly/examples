version: 2
updates:
  - package-ecosystem: "gomod"
    directories:
      - "/go/*"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"

  - package-ecosystem: "npm"
    directories:
      - "/node/*"
      - "/scenarios/*/node"
      - "/scenarios/sidecar-runtime/examples/node-agent"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "node"

  - package-ecosystem: "pip"
    directories:
      - "/python/*"
      - "/scenarios/*/python"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    ignore:
      # The agent-assembly SDK's pydantic-ai adapter patches `Tool._run`, which
      # exists only in the pydantic-ai 0.1.x–0.2.x line; 1.x removed that entry
      # point so the governance hooks fail to attach (AttributeError). The
      # example deliberately pins `pydantic-ai>=0.1.0,<0.3.0` for this reason.
      # Skip major pydantic-ai bumps until the SDK supports pydantic-ai 1.x.
      # See PR #79.
      - dependency-name: "pydantic-ai"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
