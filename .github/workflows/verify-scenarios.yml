name: Verify Scenarios

on:
  pull_request:
    paths:
      - "scenarios/**"
      - ".github/workflows/verify-scenarios.yml"
  push:
    branches:
      - master
    paths:
      - "scenarios/**"
  # Opt-in trigger for the real end-to-end live-core-enforcement run, which needs
  # a real aa-runtime image + native SDK build that the offline matrix lacks.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Preflight: detect which scenarios are present on this branch ──────────
  preflight:
    name: Detect present scenarios
    runs-on: ubuntu-latest
    outputs:
      audit_trace: ${{ steps.check.outputs.audit_trace }}
      budget_limits: ${{ steps.check.outputs.budget_limits }}
      sidecar_runtime: ${{ steps.check.outputs.sidecar_runtime }}
      live_core: ${{ steps.check.outputs.live_core }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - id: check
        name: Check which scenario directories are present
        run: |
          audit_trace="false"
          budget_limits="false"
          sidecar_runtime="false"
          live_core="false"
          [[ -f "scenarios/audit-trace/python/agent.py" ]]                          && audit_trace="true"
          [[ -f "scenarios/budget-limits/python/agent.py" ]]                        && budget_limits="true"
          [[ -f "scenarios/sidecar-runtime/examples/python-agent/agent.py" ]]      && sidecar_runtime="true"
          [[ -f "scenarios/live-core-enforcement/python-agent/agent.py" ]]         && live_core="true"
          echo "audit_trace=$audit_trace"   >> "$GITHUB_OUTPUT"
          echo "budget_limits=$budget_limits" >> "$GITHUB_OUTPUT"
          echo "sidecar_runtime=$sidecar_runtime" >> "$GITHUB_OUTPUT"
          echo "live_core=$live_core" >> "$GITHUB_OUTPUT"
          echo "audit-trace present:      $audit_trace"
          echo "budget-limits present:    $budget_limits"
          echo "sidecar-runtime present:  $sidecar_runtime"
          echo "live-core present:        $live_core"

  # ── Structural check: required files must be present ─────────────────────
  structure-check:
    name: Scenario structure check
    needs: preflight
    if: |
      needs.preflight.outputs.audit_trace == 'true'   ||
      needs.preflight.outputs.budget_limits == 'true' ||
      needs.preflight.outputs.sidecar_runtime == 'true' ||
      needs.preflight.outputs.live_core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Check required scenario files
        run: |
          set -e
          for scenario in audit-trace budget-limits sidecar-runtime live-core-enforcement; do
            if [[ -d "scenarios/$scenario" ]]; then
              echo "Checking scenarios/$scenario ..."
              test -f "scenarios/$scenario/README.md" \
                || { echo "MISSING: scenarios/$scenario/README.md"; exit 1; }
            fi
          done
          [[ -f "scenarios/audit-trace/expected-output.txt" ]] \
            && echo "audit-trace/expected-output.txt ✓" \
            || echo "INFO: audit-trace not yet present"
          [[ -f "scenarios/budget-limits/expected-output.txt" ]] \
            && echo "budget-limits/expected-output.txt ✓" \
            || echo "INFO: budget-limits not yet present"
          [[ -f "scenarios/budget-limits/policy.yaml" ]] \
            && echo "budget-limits/policy.yaml ✓" \
            || echo "INFO: budget-limits not yet present"
          [[ -f "scenarios/sidecar-runtime/docker-compose.yml" ]] \
            && echo "sidecar-runtime/docker-compose.yml ✓" \
            || echo "INFO: sidecar-runtime not yet present"
          [[ -f "scenarios/live-core-enforcement/docker-compose.yml" ]] \
            && echo "live-core-enforcement/docker-compose.yml ✓" \
            || echo "INFO: live-core-enforcement not yet present"
          [[ -f "scenarios/live-core-enforcement/policy.yaml" ]] \
            && echo "live-core-enforcement/policy.yaml ✓" \
            || echo "INFO: live-core-enforcement not yet present"
          echo "Structure check passed for all present scenarios."

  # ── Python smoke paths ───────────────────────────────────────────────────
  smoke-python-audit-trace:
    name: "smoke: audit-trace (python)"
    needs: preflight
    if: needs.preflight.outputs.audit_trace == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Run audit-trace Python example
        run: python scenarios/audit-trace/python/agent.py

  smoke-python-budget-limits:
    name: "smoke: budget-limits (python)"
    needs: preflight
    if: needs.preflight.outputs.budget_limits == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Run budget-limits Python example
        run: python scenarios/budget-limits/python/agent.py

  smoke-python-sidecar-runtime:
    name: "smoke: sidecar-runtime (python, offline)"
    needs: preflight
    if: needs.preflight.outputs.sidecar_runtime == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Run sidecar-runtime Python example in offline mode
        run: python scenarios/sidecar-runtime/examples/python-agent/agent.py
        # ASSEMBLY_GATEWAY_URL intentionally unset — tests the offline fallback path.

  # ── live-core-enforcement: offline-safe validation ───────────────────────
  # This scenario's real allow/deny flow needs a real aa-runtime + aa-gateway,
  # which CI cannot build/run inline. The live run is opt-in / manual (see the
  # scenario README and the `live-core-enforcement-live` job below). Offline,
  # CI honestly asserts only that the example code is valid and imports the REAL
  # SDK (no shim), and that policy.yaml is a valid section-based policy.
  validate-live-core:
    name: "validate: live-core-enforcement (offline, no gateway)"
    needs: preflight
    if: needs.preflight.outputs.live_core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install PyYAML for policy validation
        run: pip install pyyaml
      - name: Validate example code + policy shape (no gateway required)
        run: python scenarios/live-core-enforcement/scripts/check-offline.py
      - name: Validate docker-compose config
        run: docker compose -f scenarios/live-core-enforcement/docker-compose.yml config -q

  # ── live-core-enforcement: real end-to-end run (opt-in, manual) ──────────
  # Disabled in normal CI: it requires the real aa-runtime image and a native
  # SDK build, which the offline runner does not have. Trigger it deliberately
  # via the Actions "Run workflow" button when a gateway image is available.
  live-core-enforcement-live:
    name: "live: live-core-enforcement (real gateway)"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Bring up the real stack and run the agent
        run: |
          cd scenarios/live-core-enforcement
          bash scripts/start.sh
      - name: Tear down
        if: always()
        run: |
          cd scenarios/live-core-enforcement
          bash scripts/stop.sh || true

  # ── Node.js smoke paths ──────────────────────────────────────────────────
  smoke-node-audit-trace:
    name: "smoke: audit-trace (node)"
    needs: preflight
    if: needs.preflight.outputs.audit_trace == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
      - name: Run audit-trace Node.js example
        run: node scenarios/audit-trace/node/agent.js

  smoke-node-budget-limits:
    name: "smoke: budget-limits (node)"
    needs: preflight
    if: needs.preflight.outputs.budget_limits == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
      - name: Run budget-limits Node.js example
        run: node scenarios/budget-limits/node/agent.js

  smoke-node-sidecar-runtime:
    name: "smoke: sidecar-runtime (node, offline)"
    needs: preflight
    if: needs.preflight.outputs.sidecar_runtime == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
      - name: Run sidecar-runtime Node.js example in offline mode
        run: node scenarios/sidecar-runtime/examples/node-agent/agent.js
        # ASSEMBLY_GATEWAY_URL intentionally unset — tests the offline fallback path.

  # ── policy-enforcement scenario ──────────────────────────────────────────
  policy-enforcement-python:
    name: policy-enforcement / python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "latest"

      - name: Run smoke tests
        run: |
          if [ -d "scenarios/policy-enforcement/python" ]; then
            cd scenarios/policy-enforcement/python
            uv sync --extra dev
            uv run pytest tests/ -v
          else
            echo "scenarios/policy-enforcement/python not yet present — skipping"
          fi

  policy-enforcement-node:
    name: policy-enforcement / node
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: scenarios/policy-enforcement/node/pnpm-lock.yaml

      - name: Install and typecheck
        run: |
          if [ -d "scenarios/policy-enforcement/node" ]; then
            cd scenarios/policy-enforcement/node
            pnpm install
            pnpm run build
          else
            echo "scenarios/policy-enforcement/node not yet present — skipping"
          fi

      - name: Run tests
        run: |
          if [ -d "scenarios/policy-enforcement/node" ]; then
            cd scenarios/policy-enforcement/node
            pnpm test
          else
            echo "scenarios/policy-enforcement/node not yet present — skipping"
          fi

  policy-enforcement-go:
    name: policy-enforcement / go
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: "1.26"

      - name: Run tests
        run: |
          if [ -d "scenarios/policy-enforcement/go" ]; then
            cd scenarios/policy-enforcement/go
            go test ./...
          else
            echo "scenarios/policy-enforcement/go not yet present — skipping"
          fi

  # ── approval-gates scenario ───────────────────────────────────────────────
  approval-gates-python:
    name: approval-gates / python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "latest"

      - name: Run smoke tests
        run: |
          if [ -d "scenarios/approval-gates/python" ]; then
            cd scenarios/approval-gates/python
            uv sync --extra dev
            uv run pytest tests/ -v
          else
            echo "scenarios/approval-gates/python not yet present — skipping"
          fi

  approval-gates-node:
    name: approval-gates / node
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: scenarios/approval-gates/node/pnpm-lock.yaml

      - name: Install and typecheck
        run: |
          if [ -d "scenarios/approval-gates/node" ]; then
            cd scenarios/approval-gates/node
            pnpm install
            pnpm run build
          else
            echo "scenarios/approval-gates/node not yet present — skipping"
          fi

      - name: Run tests
        run: |
          if [ -d "scenarios/approval-gates/node" ]; then
            cd scenarios/approval-gates/node
            pnpm test
          else
            echo "scenarios/approval-gates/node not yet present — skipping"
          fi
