name: Example Metadata Drift Check

on:
  pull_request:
    paths:
      - "metadata/sdk-versions.yaml"
      - "metadata/framework-labels.json"
      - "scripts/generate_example_metadata.py"
      - "scripts/extract_snippets.py"
      - "python/**/pyproject.toml"
      - "python/**/README.md"
      - "python/**/src/main.py"
      - "node/**/package.json"
      - "node/**/README.md"
      - "node/**/src/index.ts"
      - "go/**/go.mod"
      - "go/**/README.md"
      - "go/**/main.go"
      - "snippets/**"
      - "scenarios/**/pyproject.toml"
      - "scenarios/**/package.json"
      - "scenarios/**/go.mod"
      - "scenarios/**/Dockerfile"
      - "scenarios/**/README.md"
      - "scripts/test_generate_example_metadata.py"
      - ".github/workflows/**"
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  drift-check:
    name: metadata drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Regenerate example metadata
        run: python scripts/generate_example_metadata.py

      - name: Regenerate quick-start snippets
        run: python scripts/extract_snippets.py

      - name: Fail if regeneration produced a diff
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated example metadata or quick-start snippets are out of sync."
            echo "::error::Metadata source: metadata/sdk-versions.yaml -> scripts/generate_example_metadata.py"
            echo "::error::Snippet source: region: quickstart markers -> scripts/extract_snippets.py"
            echo "::error::Run both generators locally and commit the result:"
            echo "::error::  python scripts/generate_example_metadata.py"
            echo "::error::  python scripts/extract_snippets.py"
            exit 1
          fi

      - name: Audit for orphan SDK-version literals
        run: python scripts/generate_example_metadata.py --check

      - name: Run generator unit tests
        run: python -m unittest scripts.test_generate_example_metadata
