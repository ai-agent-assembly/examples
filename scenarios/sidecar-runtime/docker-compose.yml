version: "3.9"

# Lightweight local Agent Assembly runtime for development and testing.
#
# Start:  bash scripts/start.sh
# Stop:   bash scripts/stop.sh
#
# To use the real Agent Assembly gateway instead of this mock, replace the
# `build` block with:
#   image: ghcr.io/ai-agent-assembly/aa-gateway:latest
# and configure credentials via environment variables.

services:
  assembly-gateway:
    build:
      context: mock-gateway
    ports:
      - "8080:8080"   # SDK session + governed calls (aa-sdk-client connects here)
      # Port 50051 (gRPC) is the production gateway transport for aa-sdk-client.
      # The mock uses HTTP only for simplicity; the SDK is still the only caller.
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health 2>/dev/null | grep -q ok || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
