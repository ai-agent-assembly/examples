version: 2
updates:
  - package-ecosystem: "gomod"
    directories:
      - "/go/*"
      - "/scenarios/live-core-enforcement/go-agent"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"

  - package-ecosystem: "npm"
    directories:
      - "/node/*"
      - "/scenarios/*/node"
      - "/scenarios/sidecar-runtime/examples/node-agent"
      - "/scenarios/live-core-enforcement/node-agent"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "node"
    ignore:
      # TypeScript 6.0.x regresses NodeNext resolution of `node:` builtin
      # imports (TS2591 "Cannot find name 'node:fs'"), breaking the node
      # scenarios that use `node:`-prefixed imports. The affected package.json
      # files pin `typescript ^5.9.3` and say "Bump to ^6 once fixed upstream".
      # Skip major typescript bumps until the upstream regression is fixed.
      # See PRs #104, #105.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "pip"
    directories:
      - "/python/*"
      - "/scenarios/*/python"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    ignore:
      # AAASM-4778 accepted risk: mcp and json-repair are transitive-only deps
      # pulled in solely by crewai (crewai-research-crew `live` extra, which CI
      # never installs — it runs the --mock/dev path via `uv sync --extra dev`).
      # crewai~=1.15 hard-pins mcp~=1.26.0 (<1.27) and json-repair~=0.25.2
      # (<0.26) on every released and pre-released version, so no reachable
      # patched version exists until an upstream crewai release relaxes the
      # pins. Remove these ignores once crewai adopts patched mcp/json-repair.
      - dependency-name: "mcp"
      - dependency-name: "json-repair"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
