name: Verify Go examples

on:
  push:
    branches: [master]
    paths:
      - "go/**"
      # The lint job scans all of scenarios/ (gofmt -l go scenarios; go vet over
      # every scenarios/**/go.mod), so gate on any Go file or module there — not
      # just the one go-agent dir — or a Go change elsewhere ships un-gated.
      - "scenarios/**/*.go"
      - "scenarios/**/go.mod"
      - "scenarios/**/go.sum"
      - ".github/workflows/verify-go.yml"
  pull_request:
    branches: [master]
    paths:
      - "go/**"
      # Mirror the push filter: the lint job scans all of scenarios/, so any Go
      # file or module under it must trigger the gate on its own PR.
      - "scenarios/**/*.go"
      - "scenarios/**/go.mod"
      - "scenarios/**/go.sum"
      - ".github/workflows/verify-go.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint Go examples (gofmt + vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version: "1.26"
          cache: false

      # Scope to real example modules under go/ and the scenario go-agent. The
      # snippets/ tree is intentionally excluded: snippets/go/*.go are extracted
      # quick-start fragments with no package clause (see scripts/extract_snippets.py),
      # so they are not gofmt-parseable and must not be linted here.
      - name: gofmt
        run: |
          unformatted=$(gofmt -l go scenarios)
          if [ -n "$unformatted" ]; then
            echo "::error::The following Go files are not gofmt-clean. Run 'gofmt -w' on them:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: |
          set -euo pipefail
          for mod in $(find go scenarios -name go.mod | sort); do
            dir=$(dirname "$mod")
            echo "==> go vet $dir"
            (cd "$dir" && go vet ./...)
          done

  test:
    name: Test Go examples
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - basic-agent
          - tool-policy
          - langchaingo
          - cli-runtime-integration

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version: "1.26"
          cache-dependency-path: go/${{ matrix.example }}/go.sum

      - name: Test ${{ matrix.example }}
        env:
          EXAMPLE: ${{ matrix.example }}
        run: |
          if [ -d "go/${EXAMPLE}" ]; then
            cd "go/${EXAMPLE}" && go test ./...
          else
            echo "go/${EXAMPLE} not yet present — skipping"
          fi
