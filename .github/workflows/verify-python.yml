name: Verify Python Examples

on:
  pull_request:
    paths:
      - "python/**"
  push:
    branches:
      - main
    paths:
      - "python/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  langchain-basic-agent:
    name: langchain-basic-agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python/langchain-basic-agent
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev --locked --no-build

      - name: Run smoke tests
        run: uv run --locked --no-build pytest tests/ -v

  custom-tool-policy:
    name: custom-tool-policy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python/custom-tool-policy
